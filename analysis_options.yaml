# Inherit Flutter's official base rules
include: package:flutter_lints/flutter.yaml

analyzer:
  # Exclude auto-generated files from analysis to prevent false warnings
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # --- Code Formatting & Style ---
    prefer_single_quotes: true        # Enforce single quotes (standard in Dart)
    require_trailing_commas: true     # Enforce trailing commas for multi-line parameters/arguments
    always_declare_return_types: true # Enforce explicit return types for functions and methods
    
    # --- Performance & Debugging ---
    prefer_const_constructors: true   # Enforce const constructors where possible to boost UI performance
    prefer_const_declarations: true   # Enforce const declarations for static variables
    avoid_print: true                 # Prevent print statements in production (use a logger instead)
    
    # --- Safety & Error Prevention ---
    avoid_empty_else: true            # Prevent empty else blocks
    cancel_subscriptions: true        # Ensure Stream subscriptions are cancelled to prevent memory leaks
    unnecessary_null_in_if_null_operators: true # Prevent redundant null fallbacks (e.g., a ?? null)